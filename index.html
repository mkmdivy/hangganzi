<meta charset="UTF-8">

<title>한국 가요의 역사 1992–2023</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080810;--c1:#ff6b9d;--c2:#ff9f43;--c3:#fdcb6e;--c4:#a29bfe;--c5:#636e72;
  --text:#e8e8f0;--muted:#44445a;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',-apple-system,sans-serif}

/* ── SPLASH ─────────────────────────────────────── */
#splash{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
#splash::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 45%,rgba(162,155,254,.2) 0%,transparent 65%);
  pointer-events:none;
}
.splash-inner{text-align:center;padding:2rem;max-width:560px;position:relative}
.splash-eyebrow{font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:var(--c4);margin-bottom:1.2rem}
.splash-title{font-size:clamp(2.5rem,7vw,5.5rem);font-weight:900;line-height:1.05;margin-bottom:.8rem;
  background:linear-gradient(135deg,#ff6b9d,#a29bfe,#74b9ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.splash-sub{font-size:clamp(.9rem,1.8vw,1.1rem);color:var(--muted);line-height:1.75;margin-bottom:.6rem}
.splash-years{font-size:1.2rem;font-weight:700;letter-spacing:.2em;color:rgba(255,255,255,.18);margin-bottom:2.5rem}
.splash-btns{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.2rem}
.btn-start{
  display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 2rem;border:none;border-radius:50px;
  font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .15s,opacity .15s
}
.btn-start:hover{transform:scale(1.04);opacity:.9}
.btn-start.primary{background:linear-gradient(135deg,#ff6b9d,#a29bfe);color:#fff}
.btn-start.secondary{background:rgba(255,255,255,.08);color:var(--muted);border:1px solid rgba(255,255,255,.12)}
.splash-hint{font-size:.75rem;color:var(--muted);letter-spacing:.04em}

/* ── APP ────────────────────────────────────────── */
#app{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .6s}
#app.visible{opacity:1;pointer-events:auto}

/* ── HEADER ─────────────────────────────────────── */
#header{
  flex-shrink:0;height:62px;display:flex;align-items:stretch;
  background:rgba(8,8,16,.9);border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(10px);position:relative;z-index:20
}
#now-playing{
  display:flex;align-items:center;gap:14px;padding:0 20px;min-width:280px;
}
#np-year{
  font-size:2.2rem;font-weight:900;letter-spacing:-.03em;line-height:1;
  background:linear-gradient(135deg,#ff6b9d,#a29bfe);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  transition:opacity .3s
}
#np-info{display:flex;flex-direction:column;gap:2px;overflow:hidden;transition:opacity .3s}
#np-title{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}
#np-artist{font-size:.78rem;color:var(--c4);font-weight:400}
@keyframes np-flash{0%{opacity:.3}100%{opacity:1}}
.np-change{animation:np-flash .4s ease-out}
#streak{
  display:flex;align-items:center;gap:6px;padding:0 18px;border-left:1px solid rgba(255,255,255,.07);
  opacity:0;transition:opacity .4s
}
#streak.show{opacity:1}
#streak-num{font-size:1.8rem;font-weight:900;color:var(--c1);line-height:1}
#streak-label{font-size:.7rem;color:var(--muted);letter-spacing:.05em}
#rank-headers{
  display:flex;margin-left:auto;align-items:center;
}
.rank-hdr{
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;letter-spacing:.08em;
  color:var(--muted);width:0;flex:1;text-align:center
}
.rank-hdr[data-rank="1"]{color:var(--c1)}
.rank-hdr[data-rank="2"]{color:var(--c2)}
.rank-hdr[data-rank="3"]{color:var(--c3)}
.rank-hdr[data-rank="4"]{color:var(--c4)}

/* ── CHART ──────────────────────────────────────── */
#chart-wrap{
  flex:1;position:relative;overflow:hidden;
}
#lines-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#faces{position:absolute;inset:0;pointer-events:auto}
#current-line{
  position:absolute;left:0;right:0;height:2px;pointer-events:none;z-index:8;
  background:rgba(255,107,157,.55);
  box-shadow:0 0 18px rgba(255,107,157,.7),0 0 40px rgba(255,107,157,.3)
}
/* lane dividers */
.lane-div{
  position:absolute;top:0;bottom:0;width:1px;
  background:rgba(255,255,255,.04);pointer-events:none;z-index:1
}

/* ── CARDS ──────────────────────────────────────── */
.face-card{
  position:absolute;border-radius:10px;overflow:hidden;
  border:1.5px solid rgba(255,255,255,.15);
  background-size:cover;background-position:center center;
  background-color:#1a1a2e;
  cursor:pointer;
  transition:box-shadow .2s;
  box-shadow:0 3px 14px rgba(0,0,0,.55);
  will-change:top,opacity;
}
.face-card:hover{box-shadow:0 4px 22px rgba(255,255,255,.18),0 3px 14px rgba(0,0,0,.55)}
.face-card.rank1{border-color:var(--c1);box-shadow:0 0 16px rgba(255,107,157,.5),0 3px 14px rgba(0,0,0,.5)}
.face-card.rank2{border-color:var(--c2)}
.face-card.rank3{border-color:var(--c3)}
.face-card.rank4{border-color:var(--c4)}
.card-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.5) 55%,transparent 100%);
  padding:6px 8px 5px;
}
.card-title{
  display:block;font-size:.72rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;line-height:1.3
}
.card-artist{
  display:block;font-size:.62rem;color:rgba(255,255,255,.6);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3
}
.card-rank-badge{
  position:absolute;top:5px;right:5px;
  background:rgba(0,0,0,.7);border-radius:4px;
  font-size:.6rem;font-weight:700;padding:2px 5px;color:#fff
}

/* ── YEAR BG ─────────────────────────────────────── */
#year-bg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(5rem,22vw,16rem);font-weight:900;
  color:rgba(255,255,255,.025);pointer-events:none;z-index:0;
  letter-spacing:-.05em;user-select:none;transition:opacity .8s
}

/* ── CONTROLS ────────────────────────────────────── */
#controls{
  flex-shrink:0;height:58px;display:flex;align-items:center;gap:16px;
  padding:0 20px;background:rgba(8,8,16,.95);
  border-top:1px solid rgba(255,255,255,.06);position:relative;z-index:20
}
#play-pause-btn{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,#ff6b9d,#a29bfe);color:#fff;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:inherit;transition:transform .15s;box-shadow:0 0 16px rgba(255,107,157,.4)
}
#play-pause-btn:hover{transform:scale(1.08)}
#slider-wrap{flex:1;padding:0 8px}
/* noUiSlider overrides */
.noUi-target{background:#1e1e30;border:none;border-radius:4px;height:6px;box-shadow:none}
.noUi-connect{background:linear-gradient(to right,var(--c1),var(--c4))}
.noUi-handle{border:none;background:var(--c1);border-radius:50%;width:18px!important;height:18px!important;
  top:-6px!important;right:-9px!important;cursor:pointer;box-shadow:0 0 10px rgba(255,107,157,.6)}
.noUi-handle::before,.noUi-handle::after{display:none}
.noUi-tooltip{
  background:rgba(18,18,30,.95);border:1px solid rgba(162,155,254,.4);
  color:#fff;font-size:.72rem;font-family:'Noto Sans KR',sans-serif;font-weight:700;
  padding:3px 8px;border-radius:4px;bottom:130%
}
.noUi-pips{color:var(--muted);font-size:.6rem;font-family:'Noto Sans KR',sans-serif}
.noUi-value{color:var(--muted)}
.noUi-marker{background:rgba(255,255,255,.2)}
#mute-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);
  background:transparent;color:var(--text);cursor:pointer;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;
  transition:background .15s,border-color .15s
}
#mute-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
#mute-btn.muted{color:var(--muted)}

/* ── YT HOLDER ───────────────────────────────────── */
#yt-holder{position:fixed;bottom:-200px;left:-200px;width:1px;height:1px;opacity:.01;pointer-events:none}
</style>
</head>

// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════
const RANK_COLORS = ['#ff6b9d','#ff9f43','#fdcb6e','#a29bfe','#636e72'];
const GENRE_BG = {
  '발라드':'#1a2560','댄스':'#5c1a3a','아이돌':'#3a1a5c','힙합':'#5c4a1a',
  'R&B':'#1a4a3a','트로트':'#5c2a1a','록':'#1a1a5c','솔로':'#1a5c3a'
};
const RANKS      = 5;
const WINDOW     = 5;         // years visible in chart at once
const START_YEAR = 1992;
const END_YEAR   = 2023;
const YEAR_SPEED = 1 / 10000; // 1 year per 10 000 ms → smooth continuous scroll

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let yrF = START_YEAR;    // float year — drives visual position
let yrI = START_YEAR;    // integer year — drives audio / header
let playing = false;
let muted   = false;
let rafId   = null;
let lastTs  = null;
let lastSongKey = null;
let streakCount = 0;
let streakArtist = '';
let draggingSlider = false;
let slider = null;

// Map of "title|year" → { el, dying, slideTimer }
const cardEls = new Map();

// ══════════════════════════════════════════════════════════
// LAYOUT
// ══════════════════════════════════════════════════════════
function chartDims() {
  const w = document.getElementById('chart-wrap');
  return { W: w.clientWidth, H: w.clientHeight };
}
function laneX(rank) {
  const { W } = chartDims();
  const lw = W / RANKS;
  return (rank - 1) * lw + lw / 2;
}
function yearY(year) {        // uses float yrF for smooth positioning
  const { H } = chartDims();
  return (yrF - year + 0.5) * (H / WINDOW);
}
function cardSize() {
  const { W, H } = chartDims();
  const lw = W / RANKS;
  const rh = H / WINDOW;
  const CW = Math.min(lw - 24, 200);
  const CH = Math.round(CW * 0.72);
  return { CW, CH, rh, lw };
}
function cardOpacity(s) {
  const age = yrF - s.y;
  return Math.max(0.10, 1 - age * (0.72 / WINDOW));
}

// ══════════════════════════════════════════════════════════
// D3 SVG  +  GLOW FILTER
// ══════════════════════════════════════════════════════════
const svg = d3.select('#lines-svg');
(function createGlow() {
  const defs   = svg.append('defs');
  const filter = defs.append('filter').attr('id','glow-filter').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  filter.append('feGaussianBlur').attr('stdDeviation','6').attr('result','blur');
  const merge  = filter.append('feMerge');
  merge.append('feMergeNode').attr('in','blur');
  merge.append('feMergeNode').attr('in','SourceGraphic');
})();

// ══════════════════════════════════════════════════════════
// LINES — rebuild path elements when integer year changes
//          updateLines() recalculates path `d` every frame
// ══════════════════════════════════════════════════════════
function buildSegments() {
  const winStart = yrI - WINDOW + 1;
  const visible  = songs.filter(s => s.y >= winStart && s.y <= yrI);
  const byArtist = d3.group(visible, d => d.a);
  const segs = [];
  byArtist.forEach((pts, artist) => {
    pts = pts.slice().sort((a,b) => a.y - b.y);
    let seg = [pts[0]];
    for (let i = 1; i < pts.length; i++) {
      if (pts[i].y - pts[i-1].y <= 1) { seg.push(pts[i]); }
      else { if (seg.length >= 2) segs.push({ artist, pts: seg }); seg = [pts[i]]; }
    }
    if (seg.length >= 2) segs.push({ artist, pts: seg });
  });
  return segs;
}

function rebuildLines() {
  const segs = buildSegments();
  const r1   = segs.filter(s => s.pts.some(p => p.r === 1));
  const rest = segs.filter(s => !s.pts.some(p => p.r === 1));

  const key = d => d.artist + ':' + d.pts[0].y;
  svg.selectAll('.a-path').data(rest, key).join('path')
    .attr('class','a-path').attr('fill','none')
    .attr('stroke', d => RANK_COLORS[d.pts[0].r - 1] || '#555')
    .attr('stroke-width', 1.5).attr('stroke-linecap','round').attr('stroke-opacity',.28);

  svg.selectAll('.glow-path').data(r1, key).join('path')
    .attr('class','glow-path').attr('fill','none')
    .attr('stroke','#ff6b9d').attr('stroke-width',18).attr('stroke-linecap','round')
    .attr('filter','url(#glow-filter)').attr('stroke-opacity',.22);

  svg.selectAll('.rank1-path').data(r1, key).join('path')
    .attr('class','rank1-path').attr('fill','none')
    .attr('stroke','#ff6b9d').attr('stroke-width',3.5).attr('stroke-linecap','round').attr('stroke-opacity',.9);
}

function updateLines() {
  const { W, H } = chartDims();
  svg.attr('viewBox', `0 0 ${W} ${H}`);

  const lineGen = d3.line()
    .x(d => laneX(d.r)).y(d => yearY(d.y))
    .curve(d3.curveCatmullRom.alpha(0.5));

  const pathFn = d => lineGen(d.pts);
  svg.selectAll('.a-path, .glow-path, .rank1-path').attr('d', pathFn);

  const rh = H / WINDOW;
  d3.select('#current-line').style('top', (rh * 0.5 - 1) + 'px');
  document.getElementById('year-bg').textContent = yrI;
}

// ══════════════════════════════════════════════════════════
// CARDS — DOM-managed; position updated each RAF frame
// ══════════════════════════════════════════════════════════
function rebuildCards() {
  const { CW, CH, rh } = cardSize();
  const winStart = yrI - WINDOW + 1;
  const visible  = songs.filter(s => s.y >= winStart && s.y <= yrI);
  const visKeys  = new Set(visible.map(s => s.t + '|' + s.y));
  const facesEl  = document.getElementById('faces');

  // Remove cards that left the window
  for (const [key, info] of cardEls) {
    if (!visKeys.has(key) && !info.dying) {
      info.dying = true;
      clearTimeout(info.slideTimer);
      info.el.style.transition = 'opacity 0.45s ease';
      info.el.style.opacity = '0';
      setTimeout(() => { try { info.el.remove(); } catch(e){} cardEls.delete(key); }, 480);
    }
  }

  // Add new cards
  for (const s of visible) {
    const key = s.t + '|' + s.y;
    if (cardEls.has(key)) continue;

    const el = document.createElement('div');
    el.className = `face-card rank${s.r}`;
    el.style.width   = CW + 'px';
    el.style.height  = CH + 'px';
    el.style.borderColor = RANK_COLORS[s.r - 1];
    if (s.id) el.style.backgroundImage = `url(https://img.youtube.com/vi/${s.id}/hqdefault.jpg)`;
    else      el.style.backgroundColor = GENRE_BG[s.g] || '#1a1a2e';

    // Start above target, translate down via CSS transform
    el.style.left      = (laneX(s.r) - CW / 2) + 'px';
    el.style.top       = (yearY(s.y) - CH / 2) + 'px';
    el.style.transform = `translateY(-${rh * 0.75}px)`;
    el.style.opacity   = '0';

    el.innerHTML = `
      <div class="card-overlay">
        <span class="card-title">${s.t}</span>
        <span class="card-artist">${s.a}</span>
      </div>
      <div class="card-rank-badge">${s.r}위</div>`;

    el.addEventListener('click', () => { if (s.id) loadSong(s.id, s.t, s.a, s.y); });
    facesEl.appendChild(el);

    const info = { el, dying: false, slideTimer: null };
    cardEls.set(key, info);

    // Animate: slide down + fade in
    requestAnimationFrame(() => {
      el.style.transition = 'opacity 0.7s ease, transform 0.9s cubic-bezier(0.22,1,0.36,1)';
      el.style.opacity    = String(cardOpacity(s));
      el.style.transform  = 'translateY(0)';
      // Remove transform after slide-in so RAF can freely update `top`
      info.slideTimer = setTimeout(() => {
        if (!info.dying) { el.style.transition = ''; el.style.transform = ''; }
      }, 950);
    });
  }
}

function updatePositions() {
  const { CW, CH } = cardSize();
  const winStart = yrI - WINDOW + 1;
  const visible  = songs.filter(s => s.y >= winStart && s.y <= yrI);
  for (const s of visible) {
    const info = cardEls.get(s.t + '|' + s.y);
    if (!info || info.dying) continue;
    // Only update if not mid-slide-in (transform still animating)
    if (info.el.style.transition !== '') continue;
    info.el.style.left    = (laneX(s.r) - CW / 2) + 'px';
    info.el.style.top     = (yearY(s.y) - CH / 2) + 'px';
    info.el.style.opacity = String(cardOpacity(s));
  }
}

// ══════════════════════════════════════════════════════════
// HEADER
// ══════════════════════════════════════════════════════════
function updateHeader() {
  const top1  = songs.find(s => s.y === yrI && s.r === 1);
  const yearEl = document.getElementById('np-year');
  const infoEl = document.getElementById('np-info');
  yearEl.textContent = yrI;
  yearEl.classList.remove('np-change'); void yearEl.offsetWidth; yearEl.classList.add('np-change');
  if (top1) {
    document.getElementById('np-title').textContent  = top1.t;
    document.getElementById('np-artist').textContent = top1.a;
    infoEl.classList.remove('np-change'); void infoEl.offsetWidth; infoEl.classList.add('np-change');
    const prev = songs.find(s => s.y === yrI - 1 && s.r === 1);
    if (prev && prev.a === top1.a) {
      if (streakArtist !== top1.a) { streakCount = 2; streakArtist = top1.a; }
      else streakCount++;
      document.getElementById('streak-num').textContent = streakCount;
      document.getElementById('streak').classList.add('show');
    } else {
      streakCount = 1; streakArtist = top1.a;
      document.getElementById('streak').classList.remove('show');
    }
  }
}

// ══════════════════════════════════════════════════════════
// YOUTUBE
// ══════════════════════════════════════════════════════════
function loadSong(ytId, title, artist, year) {
  if (!ytReady || !ytId || muted) return;
  const key = year + ':' + ytId;
  if (key === lastSongKey) return;
  lastSongKey = key;
  try { ytPlayer.loadVideoById({ videoId: ytId, startSeconds: 30 }); } catch(e) {}
  document.getElementById('np-year').textContent   = year;
  document.getElementById('np-title').textContent  = title;
  document.getElementById('np-artist').textContent = artist;
}

function playCurrent() {
  const top1 = songs.find(s => s.y === yrI && s.r === 1);
  if (top1 && top1.id && !muted && ytReady) loadSong(top1.id, top1.t, top1.a, top1.y);
}

function stopAudio() {
  if (ytReady) try { ytPlayer.stopVideo(); } catch(e) {}
  lastSongKey = null;
}

// ══════════════════════════════════════════════════════════
// RAF LOOP — continuous scroll
// ══════════════════════════════════════════════════════════
function frame(ts) {
  if (!playing) { lastTs = null; return; }
  if (lastTs !== null) {
    const dt  = Math.min(ts - lastTs, 80); // cap frame delta
    yrF += YEAR_SPEED * dt;

    if (yrF >= END_YEAR + 0.08) {
      yrF = END_YEAR; updatePositions(); updateLines(); stopPlay(); return;
    }

    const newI = Math.min(END_YEAR, Math.round(yrF));
    if (newI !== yrI) {
      yrI = newI;
      rebuildCards();
      rebuildLines();
      updateHeader();
      playCurrent();
    }
    updatePositions();
    updateLines();
    if (!draggingSlider && slider) slider.set(yrF, false);
  }
  lastTs = ts;
  rafId  = requestAnimationFrame(frame);
}

// ══════════════════════════════════════════════════════════
// PLAY / PAUSE
// ══════════════════════════════════════════════════════════
function startPlay() {
  if (yrF >= END_YEAR) yrF = START_YEAR; // restart if at end
  playing = true;
  document.getElementById('play-pause-btn').textContent = '⏸';
  lastTs = null;
  rafId  = requestAnimationFrame(frame);
}
function stopPlay() {
  playing = false;
  cancelAnimationFrame(rafId);
  document.getElementById('play-pause-btn').textContent = '▶';
}
function togglePlay() { if (playing) stopPlay(); else startPlay(); }

function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('mute-btn');
  if (muted) { btn.textContent = '🔇'; btn.classList.add('muted');    stopAudio(); }
  else        { btn.textContent = '🔊'; btn.classList.remove('muted'); playCurrent(); }
}

// ══════════════════════════════════════════════════════════
// NAVIGATION (slider + keyboard)
// ══════════════════════════════════════════════════════════
function goToYear(y) {
  yrF = Math.max(START_YEAR, Math.min(END_YEAR, y));
  yrI = Math.round(yrF);
  rebuildCards(); rebuildLines(); updatePositions(); updateLines(); updateHeader();
  if (!draggingSlider && slider) slider.set(yrF, false);
  playCurrent();
}

// ══════════════════════════════════════════════════════════
// SLIDER
// ══════════════════════════════════════════════════════════
function initSlider() {
  const el = document.getElementById('year-slider');
  slider = noUiSlider.create(el, {
    start: [START_YEAR],
    step: 0.02,
    range: { min: START_YEAR, max: END_YEAR },
    tooltips: [{ to: v => Math.round(v) + '년', from: v => +v.replace('년','') }],
    pips: {
      mode: 'values',
      values: [1995, 2000, 2005, 2010, 2015, 2020],
      density: 4,
      format: { to: v => v + '', from: v => +v }
    }
  });
  slider.on('start', () => { draggingSlider = true; stopPlay(); });
  slider.on('slide', (vals) => {
    yrF = +vals[0]; yrI = Math.round(yrF);
    rebuildCards(); rebuildLines(); updatePositions(); updateLines(); updateHeader();
  });
  slider.on('end', () => { draggingSlider = false; playCurrent(); });
}

// ══════════════════════════════════════════════════════════
// INIT LANE DIVIDERS
// ══════════════════════════════════════════════════════════
function initLanes() {
  const { W } = chartDims();
  const lw = W / RANKS;
  for (let r = 1; r < RANKS; r++) {
    const d = document.createElement('div');
    d.className = 'lane-div';
    d.style.left = (r * lw) + 'px';
    document.getElementById('chart-wrap').appendChild(d);
  }
}

// ══════════════════════════════════════════════════════════
// LAUNCH
// ══════════════════════════════════════════════════════════
function launchApp() {
  document.getElementById('splash').style.cssText = 'opacity:0;transition:opacity .6s';
  setTimeout(() => document.getElementById('splash').style.display = 'none', 650);
  document.getElementById('app').classList.add('visible');
  setTimeout(() => {
    initLanes();
    initSlider();
    rebuildCards();
    rebuildLines();
    updatePositions();
    updateLines();
    updateHeader();
    startPlay();
  }, 120);
}
function startExperience() { muted = false; launchApp(); }
function startMuted() {
  muted = true;
  document.getElementById('mute-btn').textContent = '🔇';
  document.getElementById('mute-btn').classList.add('muted');
  launchApp();
}

// ══════════════════════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════════════════════
let _rT;
window.addEventListener('resize', () => {
  clearTimeout(_rT);
  _rT = setTimeout(() => {
    document.querySelectorAll('.lane-div').forEach(e => e.remove());
    initLanes();
    // reposition card sizes
    const { CW, CH } = cardSize();
    for (const [, info] of cardEls) {
      if (!info.dying) { info.el.style.width = CW + 'px'; info.el.style.height = CH + 'px'; }
    }
    rebuildLines();
    updatePositions();
    updateLines();
  }, 200);
});

// ══════════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { stopPlay(); goToYear(yrF + 1); }
  if (e.code === 'ArrowLeft')  { stopPlay(); goToYear(yrF - 1); }
  if (e.code === 'KeyM')       { toggleMute(); }
});

document.getElementById('play-pause-btn').onclick      = togglePlay;
document.getElementById('mute-btn').onclick            = toggleMute;
document.getElementById('start-btn').onclick           = startExperience;
document.getElementById('start-muted-btn').onclick     = startMuted;
</script>
